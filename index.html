<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>BKMH 훈련 루틴</title>

<!-- iOS PWA 설정 -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="훈련 루틴"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0b1120"/>

<!-- 홈 화면 아이콘 (iOS) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230b1120'/%3E%3Ctext x='90' y='125' font-size='100' text-anchor='middle'%3E🥊%3C/text%3E%3C/svg%3E"/>

<!-- Web App Manifest -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%ED%9B%88%EB%A0%A8%20%EB%A3%A8%ED%8B%B4%22%2C%22short_name%22%3A%22%ED%9B%88%EB%A0%A8%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230b1120%22%2C%22theme_color%22%3A%22%230b1120%22%2C%22start_url%22%3A%22%2F%22%7D"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b1120;--card:rgba(255,255,255,.06);--line:rgba(255,255,255,.09);
  --ink:#e2e8f0;--ink3:#64748b;
  --red:#ef4444;--green:#4ade80;--blue:#38bdf8;
}
html,body{background:var(--bg);color:var(--ink);min-height:100dvh;
  font-family:'Apple SD Gothic Neo','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;}
#app{display:flex;flex-direction:column;min-height:100dvh;}
.page{flex:1;overflow-y:auto;padding:0 1rem 5.5rem;}
.hide{display:none!important;}

/* ── Topbar ── */
.topbar{padding:calc(.85rem + env(safe-area-inset-top)) 1rem .55rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--bg);z-index:10;
  border-bottom:1px solid rgba(255,255,255,.05);}
.topbar h1{font-size:1rem;font-weight:800;}
.topbar .tsub{font-size:.63rem;color:var(--ink3);margin-top:.1rem;}
.icon-btn{background:var(--card);border:1px solid var(--line);border-radius:9px;
  width:34px;height:34px;cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;color:var(--ink3);}
.icon-btn:hover{background:rgba(255,255,255,.12);}

/* ── Bottom nav ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#111827;
  border-top:1px solid var(--line);display:flex;z-index:20;
  padding-bottom:env(safe-area-inset-bottom,0);}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;
  gap:.18rem;padding:.55rem .5rem .45rem;cursor:pointer;transition:.13s;}
.nbtn .ni{font-size:1.1rem;}
.nbtn .nl{font-size:.59rem;color:var(--ink3);}
.nbtn.act .nl{color:var(--red);}
.nbtn.act .ni{filter:drop-shadow(0 0 5px var(--red));}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:.8rem .85rem;margin:.55rem 0;}
.card-title{font-size:.68rem;font-weight:700;color:#fca5a5;
  letter-spacing:.05em;text-transform:uppercase;margin-bottom:.6rem;}

/* ── Today ── */
.today-header{text-align:center;padding:1.1rem 0 .5rem;}
.today-day{font-size:1.9rem;font-weight:800;line-height:1.1;}
.today-dt{font-size:.72rem;color:var(--ink3);margin-top:.28rem;}
.routine-badge{text-align:center;font-size:.73rem;color:var(--ink3);margin-bottom:.75rem;}
.routine-badge b{color:var(--red);}

.start-btn{display:block;width:100%;padding:.82rem;background:var(--red);color:#fff;
  border:none;border-radius:14px;font-size:.95rem;font-weight:800;cursor:pointer;
  text-align:center;letter-spacing:.02em;transition:.15s;}
.start-btn:hover{background:#dc2626;}
.start-btn.ghost{background:rgba(56,189,248,.1);color:var(--blue);
  border:1.5px solid var(--blue);}
.start-btn:disabled{opacity:.4;cursor:default;}

/* Progress */
.prog-wrap{margin:.45rem 0 .7rem;}
.prog-label{display:flex;justify-content:space-between;
  font-size:.67rem;color:var(--ink3);margin-bottom:.3rem;}
.prog-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:.35s;}

/* Checklist */
.check-item{display:flex;align-items:flex-start;gap:.7rem;
  padding:.68rem .82rem;background:var(--card);border:1px solid var(--line);
  border-radius:12px;margin-bottom:.4rem;cursor:pointer;transition:.13s;
  -webkit-tap-highlight-color:transparent;}
.check-item:active{background:rgba(255,255,255,.1);}
.check-item.done{opacity:.45;}
.ci-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);
  flex-shrink:0;margin-top:.12rem;display:flex;align-items:center;justify-content:center;
  font-size:.75rem;transition:.13s;}
.check-item.done .ci-box{background:var(--green);border-color:var(--green);color:#0b1120;}
/* ci-body: 이름 + 메타 정보 묶음 */
.ci-body{flex:1;min-width:0;}
.ci-top{display:flex;align-items:center;justify-content:space-between;gap:.35rem;flex-wrap:wrap;}
.ci-name{font-size:.87rem;font-weight:600;flex:1;min-width:0;}
.check-item.done .ci-name{text-decoration:line-through;color:var(--ink3);}
.ci-right{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.ci-amt{font-size:.68rem;color:var(--ink3);white-space:nowrap;}
/* 무게 + 휴식 한 줄 */
.ci-bottom{display:flex;align-items:center;gap:.5rem;margin-top:.3rem;flex-wrap:wrap;}
.rest-hint{font-size:.6rem;color:var(--ink3);background:rgba(255,255,255,.04);
  border-radius:5px;padding:.1rem .3rem;white-space:nowrap;}

.fin-btn{display:block;width:100%;padding:.72rem;margin-top:.5rem;
  background:rgba(74,222,128,.1);color:var(--green);
  border:1.5px solid var(--green);border-radius:14px;
  font-size:.88rem;font-weight:800;cursor:pointer;text-align:center;}
.cancel-btn{display:block;width:100%;padding:.52rem;margin-top:.4rem;
  background:none;color:var(--ink3);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;font-size:.78rem;cursor:pointer;text-align:center;
  transition:.13s;}
.cancel-btn:hover{color:#f87171;border-color:rgba(248,113,113,.3);}

/* Done banner */
.done-banner{text-align:center;padding:1.5rem 1rem .8rem;}
.done-emoji{font-size:2.4rem;}
.done-title{font-size:1.05rem;font-weight:800;margin:.45rem 0 .25rem;}
.done-sub{font-size:.73rem;color:var(--ink3);line-height:1.6;}

/* Empty */
.empty{text-align:center;padding:2rem 1rem;color:var(--ink3);}
.empty .ei{font-size:2rem;margin-bottom:.5rem;}
.empty p{font-size:.76rem;line-height:1.65;}

/* ── Stats ── */
.week-strip{display:flex;gap:.3rem;margin:.4rem 0 .6rem;}
.wday{flex:1;text-align:center;}
.wdn{font-size:.58rem;color:var(--ink3);margin-bottom:.28rem;}
.wdd{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);
  margin:0 auto;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;}
.wdd.done{background:var(--red);border-color:var(--red);color:#fff;}
.wdd.today-ring{border-color:var(--blue);}
.wdd.done.today-ring{box-shadow:0 0 0 2px rgba(56,189,248,.35);}

.stat-row{display:flex;gap:.7rem;margin:.4rem 0;}
.snum{flex:1;background:rgba(255,255,255,.04);border-radius:11px;
  padding:.6rem;text-align:center;}
.snum .sv{font-size:1.35rem;font-weight:800;}
.snum .sl{font-size:.6rem;color:var(--ink3);margin-top:.12rem;}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:.4rem 0;}
.cal-head{text-align:center;font-size:.58rem;color:var(--ink3);padding:.22rem 0;}
.cal-day{text-align:center;font-size:.67rem;padding:.28rem .1rem;border-radius:6px;}
.cal-day.has-sess{background:rgba(239,68,68,.18);color:var(--red);font-weight:700;}
.cal-day.is-today{outline:1.5px solid var(--blue);}
.cal-day.blank{opacity:0;pointer-events:none;}

/* Volume */
.vol-item{display:flex;align-items:center;gap:.55rem;
  padding:.48rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
.vol-item:last-child{border-bottom:none;}
.vol-name{flex:1;font-size:.8rem;font-weight:600;}
.vol-bar-wrap{flex:2;}
.vol-bar{height:4px;background:rgba(239,68,68,.15);border-radius:3px;overflow:hidden;}
.vol-fill{height:100%;background:var(--red);border-radius:3px;}
.vol-num{font-size:.7rem;color:var(--red);font-weight:700;width:38px;text-align:right;}

/* ── 카테고리 탭 / 관리 ── */
.day-tabs{display:flex;gap:.3rem;overflow-x:auto;padding:.4rem 0 .3rem;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.dtab{padding:.33rem .6rem;border-radius:8px;font-size:.75rem;font-weight:700;
  border:1.5px solid var(--line);color:var(--ink3);cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:.13s;}
.dtab.act{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red);}

.ri-item{display:flex;align-items:center;gap:.55rem;
  padding:.58rem .72rem;background:var(--card);border:1px solid var(--line);
  border-radius:11px;margin-bottom:.38rem;transition:.15s;}
.ri-name{flex:1;font-size:.85rem;font-weight:600;}
.ri-amt{font-size:.68rem;color:var(--ink3);}
.ri-del{background:none;border:none;color:var(--ink3);font-size:1rem;
  cursor:pointer;padding:.1rem .3rem;border-radius:5px;flex-shrink:0;line-height:1;}
.ri-del:hover{color:#f87171;background:rgba(248,113,113,.1);}
.ri-order{display:flex;flex-direction:column;gap:.12rem;flex-shrink:0;}
.ri-mv{background:none;border:none;color:var(--ink3);font-size:.72rem;
  cursor:pointer;padding:.05rem .25rem;border-radius:4px;line-height:1.2;
  transition:.1s;-webkit-tap-highlight-color:transparent;}
.ri-mv:hover{background:rgba(255,255,255,.1);color:var(--ink);}
.ri-mv:disabled{opacity:.18;cursor:default;}

.add-form{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);
  border-radius:12px;padding:.7rem;margin-top:.3rem;}
.af-row{display:flex;gap:.38rem;margin-bottom:.38rem;}
.af-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--line);
  border-radius:8px;padding:.38rem .55rem;color:var(--ink);font-size:.78rem;outline:none;}
.af-inp:focus{border-color:rgba(239,68,68,.5);}
.af-inp.sm{width:62px;flex:none;}
.af-btns{display:flex;gap:.38rem;}
.af-save{flex:1;background:var(--red);color:#fff;border:none;border-radius:8px;
  padding:.4rem;font-size:.78rem;font-weight:700;cursor:pointer;}
.af-cancel{background:var(--card);color:var(--ink3);border:1px solid var(--line);
  border-radius:8px;padding:.4rem .65rem;font-size:.78rem;cursor:pointer;}

.add-btn{display:flex;align-items:center;justify-content:center;gap:.38rem;
  padding:.52rem .72rem;border:1.5px dashed rgba(255,255,255,.14);border-radius:11px;
  color:var(--ink3);font-size:.77rem;cursor:pointer;
  background:none;width:100%;margin-top:.3rem;transition:.13s;}
.add-btn:hover{border-color:rgba(239,68,68,.4);color:var(--red);}

/* ── 무게 입력 ── */
.weight-chip{display:inline-flex;align-items:center;gap:.18rem;
  background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);
  border-radius:6px;padding:.08rem .3rem;cursor:text;flex-shrink:0;}
.weight-chip .wi{width:46px;background:transparent;border:none;
  color:var(--blue);font-size:.75rem;font-weight:700;text-align:center;
  outline:none;padding:0;}
.weight-chip .wi::placeholder{color:rgba(56,189,248,.35);}
.weight-chip .wl{font-size:.6rem;color:var(--blue);opacity:.8;}
.w-hist{font-size:.62rem;color:var(--ink3);padding:.1rem .3rem;
  border-radius:5px;background:rgba(255,255,255,.04);white-space:nowrap;}

/* ── Preset button ── */
.preset-btn{display:flex;align-items:center;justify-content:center;gap:.45rem;
  width:100%;padding:.7rem;margin-top:1rem;
  background:rgba(251,191,36,.08);border:1.5px solid rgba(251,191,36,.35);
  border-radius:12px;color:#fbbf24;font-size:.8rem;font-weight:700;cursor:pointer;}
.preset-btn:hover{background:rgba(251,191,36,.14);}
.preset-btn:disabled{opacity:.4;cursor:default;}
.preset-badge{display:inline-block;padding:.08rem .32rem;border-radius:5px;
  font-size:.6rem;font-weight:700;margin-left:.2rem;vertical-align:middle;}
.pb-box{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);
  border-radius:9px;padding:.5rem .7rem;margin:.35rem 0;font-size:.72rem;display:flex;
  align-items:flex-start;gap:.4rem;}


/* ── Banner ── */
.banner{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.28);
  border-radius:10px;padding:.58rem .82rem;font-size:.7rem;color:#fca5a5;
  display:flex;align-items:center;gap:.45rem;margin:.55rem 0;line-height:1.5;}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(5rem + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(8px);
  background:#1e293b;border:1px solid rgba(255,255,255,.12);border-radius:10px;
  padding:.5rem 1rem;font-size:.75rem;color:var(--ink);white-space:nowrap;
  z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.err{border-color:rgba(239,68,68,.5);color:#fca5a5;}
#toast.ok{border-color:rgba(74,222,128,.4);color:#4ade80;}

/* ── Profile Picker ── */
#profilePicker{position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(2rem + env(safe-area-inset-top)) 2rem calc(2rem + env(safe-area-inset-bottom));}
.pp-title{font-size:1.3rem;font-weight:800;margin-bottom:.4rem;text-align:center;}
.pp-sub{font-size:.75rem;color:var(--ink3);margin-bottom:2.2rem;text-align:center;}
.pp-cards{display:flex;gap:1rem;width:100%;max-width:320px;}
.pp-card{flex:1;background:var(--card);border:1.5px solid var(--line);
  border-radius:18px;padding:1.4rem .8rem 1.1rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  transition:.18s;-webkit-tap-highlight-color:transparent;}
.pp-card:active{transform:scale(.96);}
.pp-card.sel{border-color:var(--red);}
.pp-avatar{font-size:2.8rem;line-height:1;}
.pp-name{font-size:.95rem;font-weight:800;}
.pp-desc{font-size:.6rem;color:var(--ink3);text-align:center;line-height:1.5;}
.pp-enter{margin-top:1.5rem;background:var(--red);color:#fff;border:none;
  border-radius:14px;padding:.75rem 2.5rem;font-size:.95rem;font-weight:800;
  cursor:pointer;opacity:0;transition:.2s;pointer-events:none;}
.pp-enter.show{opacity:1;pointer-events:auto;}

/* ── Profile chip in topbar ── */
.profile-chip{display:flex;align-items:center;gap:.3rem;
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:.2rem .55rem .2rem .35rem;cursor:pointer;font-size:.72rem;font-weight:700;}
.profile-chip .pc-av{font-size:.88rem;}

/* ── YouTube button ── */
.yt-btn{display:inline-flex;align-items:center;gap:.18rem;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  border-radius:5px;padding:.1rem .3rem;font-size:.6rem;color:#fca5a5;
  cursor:pointer;text-decoration:none;flex-shrink:0;white-space:nowrap;}
.yt-btn:hover{background:rgba(239,68,68,.2);}

/* ── 카테고리 선택 칩 ── */
.cat-pick-grid{display:flex;flex-wrap:wrap;gap:.5rem;margin:.7rem 0 1rem;}
.cat-chip{flex:1 1 calc(50% - .5rem);min-width:120px;padding:.85rem .6rem;
  border-radius:13px;border:1.5px solid var(--line);background:var(--card);
  text-align:center;cursor:pointer;transition:.13s;-webkit-tap-highlight-color:transparent;}
.cat-chip .cc-ic{font-size:1.3rem;}
.cat-chip .cc-name{font-size:.8rem;font-weight:700;margin-top:.25rem;}
.cat-chip .cc-cnt{font-size:.6rem;color:var(--ink3);margin-top:.1rem;}
.cat-chip.sel{border-color:var(--red);background:rgba(239,68,68,.12);}
.cat-chip.sel .cc-name{color:#fca5a5;}
.cat-chip.empty{opacity:.4;cursor:default;}
</style>
</head>
<body>
<!-- Profile Picker -->
<div id="profilePicker">
  <div class="pp-title">누가 운동할까요?</div>
  <div class="pp-sub">이름을 선택하세요</div>
  <div class="pp-cards">
    <div class="pp-card" id="ppCard봉결" onclick="pickProfile('봉결')">
      <div class="pp-avatar">🥊</div>
      <div class="pp-name">봉결</div>
      <div class="pp-desc">복싱 · 농구<br/>스트렝스</div>
    </div>
    <div class="pp-card" id="ppCard미희" onclick="pickProfile('미희')">
      <div class="pp-avatar">🏃‍♀️</div>
      <div class="pp-name">미희</div>
      <div class="pp-desc">맨몸 운동<br/>체중감량</div>
    </div>
  </div>
  <button class="pp-enter" id="ppEnter" onclick="enterApp()">시작하기 →</button>
</div>

<div id="toast"></div>

<div id="app">
  <div class="topbar">
    <div>
      <h1 id="topTitle">훈련 루틴</h1>
      <div class="tsub" id="topSub"></div>
    </div>
    <div class="profile-chip" id="profileChip" onclick="showProfilePicker()">
      <span class="pc-av" id="profileAv">🥊</span>
      <span id="profileName">봉결</span>
    </div>
  </div>

  <div id="pageToday"    class="page"></div>
  <div id="pageStats"    class="page hide"></div>
  <div id="pageRoutines" class="page hide"></div>

  <div class="bnav">
    <div class="nbtn act" id="nToday"    onclick="switchTab('today')">
      <span class="ni">🏠</span><span class="nl">오늘</span>
    </div>
    <div class="nbtn"     id="nStats"    onclick="switchTab('stats')">
      <span class="ni">📊</span><span class="nl">기록</span>
    </div>
    <div class="nbtn"     id="nRoutines" onclick="switchTab('routines')">
      <span class="ni">🗂️</span><span class="nl">카테고리</span>
    </div>
  </div>
</div>


<script>
/* ══ UTILS ══ */
const pad = n => String(n).padStart(2,'0');
const DAYKO = ['일','월','화','수','목','금','토'];

const today    = new Date();
const todayDow = today.getDay();
const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

/* ══ PROFILE ══ */
const PROFILES = {
  '봉결': { av:'🥊', desc:'복싱·농구·스트렝스' },
  '미희':  { av:'🏃‍♀️', desc:'맨몸·체중감량' },
};
let curProfile = localStorage.getItem('boxing_profile') || '';
let pendingProfile = '';

function pickProfile(name) {
  pendingProfile = name;
  document.querySelectorAll('.pp-card').forEach(c => c.classList.remove('sel'));
  document.getElementById('ppCard'+name)?.classList.add('sel');
  const btn = document.getElementById('ppEnter');
  btn.classList.add('show');
  btn.textContent = `${PROFILES[name].av} ${name}로 시작하기 →`;
}
function enterApp() {
  if (!pendingProfile) return;
  curProfile = pendingProfile;
  localStorage.setItem('boxing_profile', curProfile);
  document.getElementById('profilePicker').classList.add('hide');
  updateProfileUI();
  loadAll();
}
function showProfilePicker() {
  pendingProfile = '';
  document.querySelectorAll('.pp-card').forEach(c => c.classList.remove('sel'));
  document.getElementById('ppEnter').classList.remove('show');
  document.getElementById('profilePicker').classList.remove('hide');
}
function updateProfileUI() {
  const p = PROFILES[curProfile] || PROFILES['봉결'];
  document.getElementById('profileAv').textContent   = p.av;
  document.getElementById('profileName').textContent = curProfile;
  document.getElementById('topTitle').textContent    =
    curProfile === '미희' ? '🏃‍♀️ 훈련 루틴' : '🥊 복싱 훈련 루틴';
}

/* ══ CONFIG ══ */
const SB_URL = 'https://lgrgsvoxdzzbbrxbnalx.supabase.co';

/* ══ SUPABASE ══ */
const sbH = (extra={}) => ({
  'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type': 'application/json', ...extra,
});
async function dbGet(tbl, qs='') {
  const r = await fetch(`${SB_URL}/rest/v1/${tbl}${qs?'?'+qs:''}`, { headers: sbH() });
  if (!r.ok) throw new Error(`GET ${tbl} ${r.status}`);
  return r.json();
}
async function dbPost(tbl, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${tbl}`, {
    method:'POST', headers: sbH({'Prefer':'return=representation'}),
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`POST ${tbl} ${r.status}`);
  return r.json();
}
async function dbPatch(tbl, q, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${tbl}?${q}`, {
    method:'PATCH', headers: sbH({'Prefer':'return=representation'}),
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`PATCH ${tbl} ${r.status}`);
  return r.json();
}
async function dbDelete(tbl, q) {
  const r = await fetch(`${SB_URL}/rest/v1/${tbl}?${q}`, { method:'DELETE', headers: sbH() });
  if (!r.ok) {
    const body = await r.text().catch(()=>'');
    throw new Error(`DELETE ${tbl} ${r.status}${body ? ': '+body : ''}`);
  }
}

const normId = row => { if (row && row.id != null) row.id = String(row.id); return row; };
const normIds = rows => allRows(rows).map(normId);

  exLib = {}; CATEGORIES.forEach(c => exLib[c] = []);

const CATEGORY_KEYWORDS = [
  ['플라이오', ['박스 점프','스쿼트 점프','버피','배틀로프','점핑잭','사이드 스텝 드릴','스프린트 인터벌','런닝머신']],
  ['복싱',     ['쉐도우복싱','샌드백','미트','스파링','줄넘기']],
  ['상체',     ['푸시 프레스','벤치프레스','풀업','친업','덤벨 로우','복근운동','케이블 로테이션','수퍼맨']],
  ['하체',     ['바벨 스쿼트','케틀벨 스윙','데드리프트','불가리안 스플릿 스쿼트','스쿼트','리버스 런지',
                '힙브릿지','글루트 브릿지','클램쉘','사이드 레그 레이즈','스모 스쿼트','스텝 업','런지',
                '서서 힙 킥백','플랭크','레그레이즈','바이시클 크런치','크런치']],
];
const SKIP_KEYWORDS = ['휴식','폼롤러','산책']; // 휴식일 항목은 이전하지 않음

function classifyByName(name) {
  for (const [cat, kws] of CATEGORY_KEYWORDS) {
    if (kws.some(k => name.includes(k))) return cat;
  }
  return null;
}

async function migrateOldRoutines() {
  const flagKey = `migrated_v1_${curProfile}`;
  if (localStorage.getItem(flagKey)) return;
  try {
    const oldRoutines = await dbGet('routines', `profile_name=eq.${encodeURIComponent(curProfile)}`);
    if (!oldRoutines.length) { localStorage.setItem(flagKey,'1'); return; }
    const ids = oldRoutines.map(r=>r.id).join(',');
    const oldItems = await dbGet('routine_items', `routine_id=in.(${ids})&order=item_order`);
    if (!oldItems.length) { localStorage.setItem(flagKey,'1'); return; }

    const routineByIid = {};
    oldRoutines.forEach(r => { routineByIid[r.id] = r; });

    const toInsert = []; // {category, exercise_name, sets, unit_value}
    const seen = new Set();
    for (const it of oldItems) {
      const r = routineByIid[it.routine_id];
      if (!r) continue;
      if (r.day_of_week === 6) continue; // 토(휴식) 건너뜀
      if (SKIP_KEYWORDS.some(k => it.exercise_name.includes(k))) continue;

      let cat;
      if (r.day_of_week === 4) cat = '농구 훈련';
      else if (r.day_of_week === 0) cat = '농구 경기';
      else cat = classifyByName(it.exercise_name) || '하체';

      const dedupeKey = `${cat}::${it.exercise_name}`;
      if (seen.has(dedupeKey)) continue;
      seen.add(dedupeKey);
      toInsert.push({ category: cat, exercise_name: it.exercise_name, sets: it.sets, unit_value: it.unit_value });
    }
    if (!toInsert.length) { localStorage.setItem(flagKey,'1'); return; }

    // 카테고리별 item_order 부여 후 일괄 삽입
    const orderCounter = {};
    const payload = toInsert.map(x => {
      const ord = orderCounter[x.category] ?? 0;
      orderCounter[x.category] = ord + 1;
      return {
        profile_name: curProfile, category: x.category,
        exercise_name: x.exercise_name, sets: x.sets, unit_value: x.unit_value,
        item_order: ord,
      };
    });
    const inserted = normIds(await dbPost('exercise_library', payload));
    inserted.forEach(r => { (exLib[r.category] = exLib[r.category] || []).push(r); });
    localStorage.setItem(flagKey,'1');
    showToast(`📦 기존 루틴 ${payload.length}개를 카테고리로 자동 분류했어요`, 'ok', 3000);
  } catch(e) {
    console.error('migrateOldRoutines', e);
    // 실패 시 플래그를 남기지 않아 다음 로딩 때 재시도
  }
}

const firstRow = res => Array.isArray(res) ? res[0] : res;
const allRows  = res => Array.isArray(res) ? res : (res ? [res] : []);

function backToCats() { pickStage = 'cats'; renderAll(); }

async function confirmStartTraining() {
  const chosen = pickerPool.filter(x => pickedExIds.has(x.id));
  if (!chosen.length) { showToast('운동을 1개 이상 선택해주세요', 'err', 2000); return; }
  try {
    const sess = firstRow(await dbPost('training_sessions', {
      session_date: todayStr, routine_id: null,
      is_finished: false, profile_name: curProfile,
      categories: Array.from(pickedCats).join(','),
    }));
    todaySession = sess;
    const bulk = chosen.map((it, i) => ({
      session_id: todaySession.id, routine_item_id: null,
      exercise_name: it.exercise_name, sets_planned: it.sets,
      unit_value: it.unit_value, completed: false, item_order: i,
    }));
    sessItems = allRows(await dbPost('session_items', bulk))
      .sort((a,b) => (a.item_order||0) - (b.item_order||0));
    pickStage = null; pickedCats = new Set(); pickerPool = []; pickedExIds = new Set();
    renderAll();
  } catch(e) {
    console.error('confirmStartTraining', e);
    showToast('❌ 훈련 시작 실패: ' + e.message, 'err', 4000);
  }
}

async function toggleItem(id) {
  const it = sessItems.find(x => x.id === id);
  if (!it) return;
  it.completed = !it.completed;
  renderAll();
  try { await dbPatch('session_items', `id=eq.${id}`, { completed: it.completed }); }
  catch(e) { it.completed = !it.completed; renderAll(); }
}

async function saveWeight(id, val) {
  const kg = val === '' ? null : (parseFloat(val) || null);
  const it = sessItems.find(x => x.id === id);
  if (it) it.weight_kg = kg;
  try { await dbPatch('session_items', `id=eq.${id}`, { weight_kg: kg }); }
  catch(e) { console.error('saveWeight', e); }
}

async function finishSession() {
  if (!todaySession) return;
  todaySession.is_finished = true;
  await dbPatch('training_sessions', `id=eq.${todaySession.id}`, { is_finished: true });
  renderAll();
}

async function cancelSession() {
  if (!todaySession) return;
  if (!confirm('오늘 훈련 기록을 취소할까요?\n체크한 항목이 모두 사라져요.')) return;
  try {
    await dbDelete('session_items',     `session_id=eq.${todaySession.id}`);
    await dbDelete('training_sessions', `id=eq.${todaySession.id}`);
  } catch(e) { console.error('cancelSession', e); }
  todaySession = null;
  sessItems    = [];
  renderAll();
}

async function reopenSession() {
  if (!todaySession) return;
  todaySession.is_finished = false;
  try { await dbPatch('training_sessions', `id=eq.${todaySession.id}`, { is_finished: false }); }
  catch(e) { console.error('reopenSession', e); }
  renderAll();
}

/* ── 카테고리 운동 풀 편집 ── */
async function addItem(cat, name, sets, unit) {
  const saveBtn = document.querySelector('.af-save');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중…'; }
  try {
    const ord = (exLib[cat] ?? []).length;
    const ni  = normId(firstRow(await dbPost('exercise_library', {
      profile_name: curProfile, category: cat, exercise_name: name,
      sets: parseInt(sets)||1, unit_value: unit, item_order: ord,
    })));
    if (!ni?.id) throw new Error('항목 저장 실패');
    (exLib[cat] = exLib[cat] || []).push(ni);
    addingCat = null;
  } catch(e) {
    console.error('addItem', e);
    showToast(`❌ 추가 실패: ${e.message}`, 'err', 4000);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '추가'; }
    return;
  }
  renderAll();
}

async function deleteItem(id) {
  try {
    await dbDelete('exercise_library', `id=eq.${id}`);
    for (const k of CATEGORIES) {
      if (Array.isArray(exLib[k])) exLib[k] = exLib[k].filter(x => x.id !== id);
    }
    showToast('🗑 삭제됨', 'ok');
  } catch(e) {
    showToast('❌ 삭제 실패: ' + e.message, 'err', 4000);
    console.error('deleteItem', e);
    return;
  }
  renderAll();
}

/* ── 순서 변경 ── */
async function moveItem(id, dir) {
  const items = exLib[selCat];
  if (!items) return;
  const idx = items.findIndex(x => x.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= items.length) return;

  [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
  items.forEach((it, i) => it.item_order = i);
  renderAll();

  try {
    await Promise.all(
      items.map((it, i) => dbPatch('exercise_library', `id=eq.${it.id}`, { item_order: i }))
    );
    showToast('✅ 순서 저장됨', 'ok');
  } catch(e) {
    console.error('moveItem', e);
    showToast('❌ 저장 실패: ' + e.message, 'err', 3000);
    [items[newIdx], items[idx]] = [items[idx], items[newIdx]];
    items.forEach((it, i) => it.item_order = i);
    renderAll();
  }
}

  } else {
    pickerPool.forEach(it => {
      const checked = pickedExIds.has(it.id);
      h += `<div class="check-item${checked?'':' done'}" onclick="toggleExPick('${it.id}')">
        <div class="ci-box">${checked?'✓':''}</div>
        <div class="ci-body">
          <div class="ci-top">
            <div class="ci-name">${it.exercise_name}</div>
            <div class="ci-right">
              <span class="ci-amt">${it.sets}세트 × ${it.unit_value}</span>
            </div>
          </div>
        </div>
      </div>`;
    });
  }
  h += `<button class="start-btn" onclick="confirmStartTraining()">🥊 훈련 시작 (${pickedExIds.size}개)</button>`;
  h += `<button class="cancel-btn" onclick="backToCats()">← 카테고리 다시 고르기</button>`;
  return h;
}

/* ── Stats ── */
async function renderStats() {
  const el = document.getElementById('pageStats');
  el.innerHTML = `<div class="empty"><div class="ei">⏳</div><p>기록 불러오는 중…</p></div>`;

  try {
    // 이번 주 월~일
    const dow = today.getDay();
    const diff = dow === 0 ? -6 : 1 - dow;
    const wMon = new Date(today); wMon.setHours(0,0,0,0); wMon.setDate(today.getDate() + diff);
    const wSun = new Date(wMon); wSun.setDate(wMon.getDate() + 6);
    const wS = `${wMon.getFullYear()}-${pad(wMon.getMonth()+1)}-${pad(wMon.getDate())}`;
    const wE = `${wSun.getFullYear()}-${pad(wSun.getMonth()+1)}-${pad(wSun.getDate())}`;

    // 이번 달
    const mS = `${today.getFullYear()}-${pad(today.getMonth()+1)}-01`;
    const lastDayNum = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
    const mE = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(lastDayNum)}`;

    const pf = `profile_name=eq.${encodeURIComponent(curProfile)}`;
    const [weekSess, monthSess] = await Promise.all([
      dbGet('training_sessions', `${pf}&session_date=gte.${wS}&session_date=lte.${wE}`),
      dbGet('training_sessions', `${pf}&session_date=gte.${mS}&session_date=lte.${mE}`),
    ]);
    let monthItems = [];
    if (monthSess.length) {
      const ids = monthSess.map(s=>s.id).join(',');
      monthItems = await dbGet('session_items', `session_id=in.(${ids})`);
    }

    let h = '';

    /* 주간 스트립 */
    h += `<div class="card"><div class="card-title">이번 주</div>
      <div class="week-strip">`;
    const wDates = [0,1,2,3,4,5,6].map(i => { const d=new Date(wMon); d.setDate(wMon.getDate()+i); return d; });
    const wSet = new Set(weekSess.map(s => s.session_date));
    const WDN = ['월','화','수','목','금','토','일'];
    wDates.forEach((d,i) => {
      const ds = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      const hasSess = wSet.has(ds);
      const isT = ds === todayStr;
      h += `<div class="wday">
        <div class="wdn">${WDN[i]}</div>
        <div class="wdd${hasSess?' done':''}${isT?' today-ring':''}">${hasSess?'✓':''}</div>
      </div>`;
    });
    h += `</div>`;
    const weekAch = weekSess.length ? Math.round(weekSess.length/7*100) : 0;
    h += `<div class="stat-row">
      <div class="snum"><div class="sv" style="color:var(--red);">${weekSess.length}</div><div class="sl">이번 주 훈련</div></div>
      <div class="snum"><div class="sv" style="color:var(--green);">${weekAch}%</div><div class="sl">주간 달성률</div></div>
    </div></div>`;

    /* 월간 달력 */
    h += `<div class="card"><div class="card-title">${today.getMonth()+1}월 달력</div>
      <div class="cal-grid">`;
    ['일','월','화','수','목','금','토'].forEach(d => {
      h += `<div class="cal-head">${d}</div>`;
    });
    const firstDow = new Date(today.getFullYear(), today.getMonth(), 1).getDay();
    for (let i=0; i<firstDow; i++) h += `<div class="cal-day blank"></div>`;
    const mSet = new Set(monthSess.map(s => s.session_date));
    for (let d=1; d<=lastDayNum; d++) {
      const ds = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(d)}`;
      const has = mSet.has(ds), isT = d===today.getDate();
      h += `<div class="cal-day${has?' has-sess':''}${isT?' is-today':''}">${d}</div>`;
    }
    const mFinished = monthSess.filter(s=>s.is_finished).length;
    h += `</div><div class="stat-row">
      <div class="snum"><div class="sv" style="color:var(--red);">${monthSess.length}</div><div class="sl">이번 달 훈련</div></div>
      <div class="snum"><div class="sv" style="color:var(--green);">${mFinished}</div><div class="sl">완료 세션</div></div>
    </div></div>`;

    /* 운동별 누적 세트 */
    const volMap = {};
    monthItems.filter(x=>x.completed).forEach(x => {
      volMap[x.exercise_name] = (volMap[x.exercise_name]||0) + (x.sets_planned||1);
    });
    const volArr = Object.entries(volMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
    if (volArr.length) {
      const maxV = volArr[0][1];
      h += `<div class="card"><div class="card-title">이번 달 운동별 누적</div>`;
      volArr.forEach(([name, sets]) => {
        h += `<div class="vol-item">
          <div class="vol-name">${name}</div>
          <div class="vol-bar-wrap"><div class="vol-bar">
            <div class="vol-fill" style="width:${Math.round(sets/maxV*100)}%;"></div>
          </div></div>
          <div class="vol-num">${sets}세트</div>
        </div>`;
      });
      h += `</div>`;
    }

    /* 🏋️ 무게 진행 기록 */
    const weightItems = monthItems.filter(x => x.completed && x.weight_kg != null);
    if (weightItems.length) {
      const sessDateMap = {};
      monthSess.forEach(s => { sessDateMap[s.id] = s.session_date; });

      const wByEx = {};
      weightItems.forEach(it => {
        const date = sessDateMap[it.session_id] ?? '';
        if (!wByEx[it.exercise_name]) wByEx[it.exercise_name] = [];
        wByEx[it.exercise_name].push({ date, kg: it.weight_kg });
      });

      Object.values(wByEx).forEach(arr => arr.sort((a,b) => b.date.localeCompare(a.date)));

      h += `<div class="card"><div class="card-title">🏋️ 무게 진행 기록</div>`;
      Object.entries(wByEx).forEach(([name, records]) => {
        const latest  = records[0].kg;
        const prev    = records.length > 1 ? records[1].kg : null;
        const trend   = prev == null ? '' : latest > prev ? ' <span style="color:#4ade80;">↑</span>' : latest < prev ? ' <span style="color:#f87171;">↓</span>' : ' <span style="color:var(--ink3);">→</span>';
        const dots    = records.slice(0,5).map(r =>
          `<span style="font-size:.65rem;color:var(--ink3);">${r.date.slice(5).replace('-','/')} <b style="color:var(--blue);">${r.kg}kg</b></span>`
        ).join(' · ');
        h += `<div style="padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.05);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.25rem;">
            <span style="font-size:.82rem;font-weight:700;">${name}</span>
            <span style="font-size:.95rem;font-weight:800;color:var(--blue);">${latest}kg${trend}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:.35rem;">${dots}</div>
        </div>`;
      });
      h += `</div>`;
    }

    el.innerHTML = h;
  } catch(e) {
    console.error('stats', e);
    el.innerHTML = `<div class="empty"><p>데이터를 불러오지 못했어요.</p></div>`;
  }
}

        <button class="af-cancel" onclick="cancelAdd()">취소</button>
        <button class="af-save"   onclick="saveAdd()">추가</button>

      padding:.06rem .3rem;color:#818cf8;">fitwill.app</span>
  </button>`;

  el.innerHTML = h;
  if (addingCat === selCat) setTimeout(() => document.getElementById('afName')?.focus(), 40);

/* ── Toast ── */
let _toastTimer = null;
function showToast(msg, type='ok', ms=1800) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, ms);
}

/* ── Fitwill 바로가기 ── */
function openFitwill() {
  const query = document.getElementById('afName')?.value?.trim();
  const url = query
    ? `https://fitwill.app/ko/workouts/1/?search=${encodeURIComponent(query)}`
    : 'https://fitwill.app/ko/workouts/1/';
  window.open(url, '_blank', 'noopener,noreferrer');
}

/* ── Helpers ── */
function setCat(cat) { selCat=cat; addingCat=null; renderAll(); }
function showAdd(cat) { addingCat=cat; renderAll(); }
function cancelAdd() { addingCat=null; renderAll(); }
async function saveAdd() {
  const name = document.getElementById('afName')?.value?.trim();
  const sets = document.getElementById('afSets')?.value;
  const unit = document.getElementById('afUnit')?.value?.trim();
  if (!name) { document.getElementById('afName')?.focus(); return; }
  await addItem(addingCat, name, sets||'3', unit||'회');
}

/* ══ TAB SWITCHING ══ */
function switchTab(tab) {
  curTab = tab;
  ['today','stats','routines'].forEach(t => {
    const c = t.charAt(0).toUpperCase()+t.slice(1);
    document.getElementById('page'+c).classList.toggle('hide', t!==tab);
    document.getElementById('n'+c).classList.toggle('act', t===tab);
  });
  renderAll();
}

async function loadDefaultPool(cat) {
  const pool = (DEFAULT_POOLS[curProfile] || DEFAULT_POOLS['봉결'])[cat] || [];
  if (!pool.length) return;
  const el = document.getElementById('pageRoutines');
  el.innerHTML = `<div class="empty"><div class="ei">⏳</div><p>${cat} 기본 운동 추가 중…</p></div>`;
  try {
    const existing = exLib[cat] ?? [];
    const startOrd = existing.length;
    const payload = pool.map((it, i) => ({
      profile_name: curProfile, category: cat, exercise_name: it.e,
      sets: it.s, unit_value: it.u, item_order: startOrd + i,
    }));
    const inserted = normIds(await dbPost('exercise_library', payload));
    exLib[cat] = [...existing, ...inserted];
    showToast(`✅ ${cat} 기본 운동 ${inserted.length}개 추가됨`, 'ok');
  } catch(e) {
    console.error('loadDefaultPool', e);
    showToast('❌ 추가 실패: ' + e.message, 'err', 4000);
  }
  renderAll();
}

  loadAll();
